<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="sunriseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffd166;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffd166;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
        </linearGradient>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:0.8" />
            <stop offset="50%" style="stop-color:#ffd166;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0" />
        </radialGradient>
    </defs>

    <!-- Background Circle (Soft Glow) -->
    <circle cx="128" cy="128" r="120" fill="url(#glowGrad)" opacity="0.3"/>

    <!-- Central Sun/Brain Core -->
    <circle cx="128" cy="128" r="45" fill="url(#sunriseGrad)"/>

    <!-- Inner Cognitive Pattern (Neural Network Style) -->
    <g opacity="0.9">
        <!-- Center node -->
        <circle cx="128" cy="128" r="8" fill="#fff"/>

        <!-- Neural connections (8 directions) -->
        <g stroke="#fff" stroke-width="3" opacity="0.7">
            <line x1="128" y1="128" x2="128" y2="100"/>
            <line x1="128" y1="128" x2="148" y2="108"/>
            <line x1="128" y1="128" x2="156" y2="128"/>
            <line x1="128" y1="128" x2="148" y2="148"/>
            <line x1="128" y1="128" x2="128" y2="156"/>
            <line x1="128" y1="128" x2="108" y2="148"/>
            <line x1="128" y1="128" x2="100" y2="128"/>
            <line x1="128" y1="128" x2="108" y2="108"/>
        </g>

        <!-- Outer nodes -->
        <circle cx="128" cy="100" r="5" fill="#fff"/>
        <circle cx="148" cy="108" r="5" fill="#fff"/>
        <circle cx="156" cy="128" r="5" fill="#fff"/>
        <circle cx="148" cy="148" r="5" fill="#fff"/>
        <circle cx="128" cy="156" r="5" fill="#fff"/>
        <circle cx="108" cy="148" r="5" fill="#fff"/>
        <circle cx="100" cy="128" r="5" fill="#fff"/>
        <circle cx="108" cy="108" r="5" fill="#fff"/>
    </g>

    <!-- Sun Rays (Dawn Breaking) -->
    <g stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" opacity="0.8">
        <!-- Top rays -->
        <line x1="128" y1="20" x2="128" y2="55"/>
        <line x1="85" y1="35" x2="102" y2="65"/>
        <line x1="171" y1="35" x2="154" y2="65"/>

        <!-- Side rays -->
        <line x1="35" y1="85" x2="65" y2="102"/>
        <line x1="221" y1="85" x2="191" y2="102"/>
        <line x1="35" y1="171" x2="65" y2="154"/>
        <line x1="221" y1="171" x2="191" y2="154"/>

        <!-- Bottom rays -->
        <line x1="85" y1="221" x2="102" y2="191"/>
        <line x1="171" y1="221" x2="154" y2="191"/>
        <line x1="128" y1="236" x2="128" y2="201"/>
    </g>

    <!-- Outer Arc (Horizon/Dawn) -->
    <path d="M 50 128 A 78 78 0 0 1 206 128"
          stroke="url(#sunriseGrad)"
          stroke-width="8"
          fill="none"
          stroke-linecap="round"
          opacity="0.6"/>
</svg>
